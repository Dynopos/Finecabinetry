<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inteam – Contact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 40px 32px 36px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8c06a, #c89a3a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      font-weight: 800;
      color: #0f0f0f;
      letter-spacing: -1px;
    }

    h1 {
      color: #f0f0f0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .tagline {
      color: #888;
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 28px 0;
    }

    .info-list {
      list-style: none;
      text-align: left;
      margin-bottom: 28px;
    }

    .info-list li {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      color: #ccc;
      font-size: 15px;
    }

    .info-list li:last-child { border-bottom: none; }

    .info-list .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    .info-list a {
      color: #ccc;
      text-decoration: none;
    }

    .info-list a:hover { color: #e8c06a; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:active { transform: scale(0.97); }

    .btn-gold {
      background: linear-gradient(135deg, #e8c06a, #c89a3a);
      color: #0f0f0f;
    }

    .btn-wa {
      background: #1ebe57;
      color: #fff;
    }

    .btn-outline {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
    }

    .btn-outline:hover { border-color: #555; color: #ddd; }

    footer {
      margin-top: 28px;
      color: #444;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">IT</div>
    <h1>Inteam</h1>
    <p class="tagline">Networking · Collaboration</p>

    <hr class="divider" />

    <ul class="info-list">
      <li>
        <span class="icon">📞</span>
        <a href="tel:+60182889932">018-2889932</a>
      </li>
      <li>
        <span class="icon">✉️</span>
        <a href="mailto:Borhandynopos@gmail.com">Borhandynopos@gmail.com</a>
      </li>
    </ul>

    <div class="actions">
      <button class="btn btn-gold" onclick="saveContact()">💾 Save Contact</button>
      <a class="btn btn-wa" href="https://wa.me/60182889932">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.118.549 4.107 1.51 5.837L.057 23.882a.5.5 0 0 0 .61.61l6.101-1.457A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 0 1-5.015-1.38l-.36-.214-3.718.888.903-3.63-.236-.374A9.784 9.784 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
        </svg>
        WhatsApp
      </a>
      <a class="btn btn-outline" href="mailto:Borhandynopos@gmail.com">✉️ Email</a>
    </div>

    <footer>inteam · dynopos.github.io/inteam-networking</footer>
  </div>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Inteam',
        'ORG:Inteam',
        'TEL;TYPE=CELL:+60182889932',
        'EMAIL:Borhandynopos@gmail.com',
        'URL:https://dynopos.github.io/inteam-networking',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'inteam.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
